name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: erp-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npx prisma validate --schema=src/infra/database/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Unit tests
        run: npm test -- --ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: erp-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: erp-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      # Testcontainers uses the runner's Docker daemon to start postgres:17.
      - name: E2E tests
        run: npm run test:e2e

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t erp-backend:ci erp-backend
