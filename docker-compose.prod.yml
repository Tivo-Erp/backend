# ──────────────────────────────────────────────────────────────
# ERP Backend — Production Docker Compose
#
# Requirements:
#   - Docker Engine ≥ 20.10  (Ubuntu 20.04+ / CentOS 7 with docker-ce)
#   - Docker Compose Plugin v2  (comes with docker-ce; NOT the old standalone
#     docker-compose v1 — `deploy.resources` is only respected in v2)
#   - Copy .env.prod.example → .env.prod and fill all required values
#
# First deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Update (zero data loss):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull   # if using registry
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   # App container auto-runs `prisma migrate deploy` before starting.
#
# View logs:
#   docker compose -f docker-compose.prod.yml logs -f app
#
# Stop (keeps volumes/data):
#   docker compose -f docker-compose.prod.yml down
#
# ⚠️  NEVER run `down -v` on production — it deletes all volumes/data!
# ──────────────────────────────────────────────────────────────

# ─── Shared app/worker environment ───────────────────────────
# Forwarded from .env.prod (see .env.prod.example for the full documented list).
# `${VAR:-}` → optional (feature self-disables when empty);
# `${VAR:?...}` → required, compose fails loudly if missing.
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-erp_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_prod}
  REDIS_URL: redis://redis:6379
  JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
  JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-3600}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
  AUTH_MAX_FAILED_ATTEMPTS: ${AUTH_MAX_FAILED_ATTEMPTS:-5}
  AUTH_LOCK_DURATION_SEC: ${AUTH_LOCK_DURATION_SEC:-1800}
  # REQUIRED — HRM PII + MFA secrets are AES-256-GCM encrypted with this key.
  PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY is required in .env.prod (min 16 chars)}
  # Hardening / CORS / Swagger
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
  APP_BASE_URL: ${APP_BASE_URL:-}
  # Cache / cron (Batch 6)
  CACHE_ENABLED: ${CACHE_ENABLED:-true}
  CACHE_TTL_SEC: ${CACHE_TTL_SEC:-60}
  CRON_ENABLED: ${CRON_ENABLED:-true}
  # RabbitMQ domain-event bus (empty = events stay buffered in the outbox)
  RABBITMQ_URL: ${RABBITMQ_URL:-}
  RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-erp.events}
  # MinIO / S3 object storage (empty endpoint = file endpoints return 503)
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_PORT: ${S3_PORT:-443}
  S3_USE_SSL: ${S3_USE_SSL:-true}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}
  S3_BUCKET: ${S3_BUCKET:-erp-files}
  S3_PRESIGN_TTL_SEC: ${S3_PRESIGN_TTL_SEC:-300}
  # Transactional email via Resend (empty = emails are logged, not sent)
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  # Observability
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  METRICS_TOKEN: ${METRICS_TOKEN:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # Auth hardening (SEC-001)
  MFA_ISSUER: ${MFA_ISSUER:-ERP}
  PASSWORD_RESET_TTL_SEC: ${PASSWORD_RESET_TTL_SEC:-1800}
  EMAIL_VERIFY_TTL_SEC: ${EMAIL_VERIFY_TTL_SEC:-86400}
  MFA_CHALLENGE_TTL_SEC: ${MFA_CHALLENGE_TTL_SEC:-300}

services:
  # ─── Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-backend:latest
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      <<: *app-env
      PORT: 3000
    healthcheck:
      # node:22-alpine ships busybox wget — no curl needed.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # deploy.resources requires Docker Compose v2 plugin (docker compose, NOT docker-compose v1).
    # Ubuntu 22.04+ and CentOS 7 with docker-ce >= 20.10 both support this via the compose plugin.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ─── Background Worker (INF-001) ─────────────────────────────
  # Runs BullMQ processors + cron schedulers + outbox relay. Without it,
  # background jobs and domain events are never processed. Run EXACTLY ONE.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-backend:latest
    container_name: erp-worker
    restart: unless-stopped
    # App container owns `prisma migrate deploy`; worker just boots the process.
    command: ["node", "dist/worker.js"]
    environment:
      <<: *app-env
    healthcheck:
      # No HTTP listener — a simple process check is enough.
      test: ["CMD-SHELL", "pgrep -f 'dist/worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  # ─── RabbitMQ (INF-002) ──────────────────────────────────────
  # Domain-event bus. Internal only — no host ports exposed.
  # Set RABBITMQ_URL=amqp://erp:<RABBITMQ_DEFAULT_PASS>@rabbitmq:5672 in .env.prod.
  rabbitmq:
    image: rabbitmq:3-management
    container_name: erp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-erp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required in .env.prod}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # AMQP (5672) and management UI (15672) NOT exposed to host.
    # Management UI if needed: docker exec or an SSH tunnel + temporary port map.

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_prod}
      POSTGRES_USER: ${POSTGRES_USER:-erp_admin}
      # :? means Docker will fail loudly if POSTGRES_PASSWORD is not set — intentional
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.prod}
    volumes:
      # Named volume — data survives: `docker compose down`, `docker compose restart`,
      # OS reboots, and image rebuilds. Only `docker compose down -v` would delete it.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_admin} -d ${POSTGRES_DB:-erp_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # PostgreSQL port NOT exposed to host — only accessible within erp-network.
    # Access via: docker exec -it erp-postgres psql -U erp_admin -d erp_prod

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    # --appendonly yes  → AOF persistence: data survives restart/crash
    # --maxmemory       → cap memory usage
    # --maxmemory-policy volatile-lru  → only evict keys WITH TTL (expiry set).
    #   This protects session data and refresh tokens (no TTL) from eviction.
    #   allkeys-lru (previous) would evict ANY key including auth tokens.
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy volatile-lru
    volumes:
      # Named volume — Redis AOF data persists across restarts
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Redis port NOT exposed to host — only accessible within erp-network.

# ─── Docker Secrets (JWT RS256 Keys) ─────────────────────────
# Keys are mounted as files at /run/secrets/ inside the container.
# They are NEVER stored as environment variables (avoids `env` leaking them).
secrets:
  jwt_private_key:
    file: ${JWT_PRIVATE_KEY_FILE:-./keys/private.pem}
  jwt_public_key:
    file: ${JWT_PUBLIC_KEY_FILE:-./keys/public.pem}

# ─── Volumes ─────────────────────────────────────────────────
# Named volumes are managed by Docker and persist independently of containers.
# Data is stored at: /var/lib/docker/volumes/erp-backend_pgdata/_data
#
# Backup command (PostgreSQL):
#   docker exec erp-postgres pg_dump -U erp_admin erp_prod | gzip > backup_$(date +%Y%m%d_%H%M%S).sql.gz
#
# Restore command:
#   gunzip -c backup_YYYYMMDD_HHMMSS.sql.gz | docker exec -i erp-postgres psql -U erp_admin -d erp_prod
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  rabbitmqdata:
    driver: local

# ─── Networks ────────────────────────────────────────────────
networks:
  erp-network:
    driver: bridge
