# ──────────────────────────────────────────────────────────────
# ERP Backend — Production Docker Compose
#
# Requirements:
#   - Docker Engine ≥ 20.10  (Ubuntu 20.04+ / CentOS 7 with docker-ce)
#   - Docker Compose Plugin v2  (comes with docker-ce; NOT the old standalone
#     docker-compose v1 — `deploy.resources` is only respected in v2)
#   - Copy .env.prod.example → .env.prod and fill all required values
#
# First deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Update (zero data loss):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull   # if using registry
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   # App container auto-runs `prisma migrate deploy` before starting.
#
# View logs:
#   docker compose -f docker-compose.prod.yml logs -f app
#
# Stop (keeps volumes/data):
#   docker compose -f docker-compose.prod.yml down
#
# ⚠️  NEVER run `down -v` on production — it deletes all volumes/data!
# ──────────────────────────────────────────────────────────────

# ─── Shared app/worker environment ───────────────────────────
# Forwarded from .env.prod (see .env.prod.example for the full documented list).
# `${VAR:-}` → optional (feature self-disables when empty);
# `${VAR:?...}` → required, compose fails loudly if missing.
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-erp_admin}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-erp_prod}
  REDIS_URL: redis://redis:${REDIS_PORT:-6379}
  JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
  JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-3600}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
  AUTH_MAX_FAILED_ATTEMPTS: ${AUTH_MAX_FAILED_ATTEMPTS:-5}
  AUTH_LOCK_DURATION_SEC: ${AUTH_LOCK_DURATION_SEC:-1800}
  # REQUIRED — HRM PII + MFA secrets are AES-256-GCM encrypted with this key.
  PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY is required in .env.prod (min 16 chars)}
  # Hardening / CORS / Swagger
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
  APP_BASE_URL: ${APP_BASE_URL:-}
  # Cache / cron (Batch 6)
  CACHE_ENABLED: ${CACHE_ENABLED:-true}
  CACHE_TTL_SEC: ${CACHE_TTL_SEC:-60}
  CRON_ENABLED: ${CRON_ENABLED:-true}
  # BI/OLAP DuckDB column store (BI-001). Empty = BI endpoints return 503.
  # To enable + PERSIST the cube across rebuilds, set in .env.prod:
  #   DUCKDB_PATH=/app/data/olap.duckdb
  # The /app/data dir is backed by the `duckdbdata` named volume (see below),
  # so the cube survives `up -d --build`. See the single-writer caveat there.
  DUCKDB_PATH: ${DUCKDB_PATH:-}
  # RabbitMQ domain-event bus (empty = events stay buffered in the outbox)
  RABBITMQ_URL: ${RABBITMQ_URL:-}
  RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-erp.events}
  # MinIO / S3 object storage (empty endpoint = file endpoints return 503)
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_PORT: ${S3_PORT:-443}
  S3_USE_SSL: ${S3_USE_SSL:-true}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}
  S3_BUCKET: ${S3_BUCKET:-erp-files}
  S3_PRESIGN_TTL_SEC: ${S3_PRESIGN_TTL_SEC:-300}
  # Transactional email via Resend (empty = emails are logged, not sent)
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  # Observability
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  METRICS_TOKEN: ${METRICS_TOKEN:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  # Auth hardening (SEC-001)
  MFA_ISSUER: ${MFA_ISSUER:-ERP}
  PASSWORD_RESET_TTL_SEC: ${PASSWORD_RESET_TTL_SEC:-1800}
  EMAIL_VERIFY_TTL_SEC: ${EMAIL_VERIFY_TTL_SEC:-86400}
  MFA_CHALLENGE_TTL_SEC: ${MFA_CHALLENGE_TTL_SEC:-300}

services:
  # ─── Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-backend:latest
    container_name: erp-backend
    restart: unless-stopped
    ports:
      # Only the API is published to the host, and only on loopback by default
      # so a reverse proxy (nginx) on the same host fronts it — never exposed
      # straight to the internet. Override APP_BIND_HOST=0.0.0.0 ONLY if you
      # understand the risk (no proxy / firewalled network).
      - "${APP_BIND_HOST:-127.0.0.1}:${PORT:-3000}:3000"
    # Drain in-flight HTTP requests on SIGTERM before the 10s default kill.
    stop_grace_period: 30s
    environment:
      <<: *app-env
      PORT: 3000
      # API process only READS the cube → open the shared DuckDB file read-only
      # so the worker can hold it read-write during ETL (single-writer model).
      DUCKDB_READONLY: "true"
    volumes:
      # Persists the DuckDB OLAP cube across rebuilds when DUCKDB_PATH is set.
      # Harmless (unused) when BI is disabled. /app/data is pre-created
      # erp-owned in the Dockerfile so the non-root user can write here.
      - duckdbdata:/app/data
    healthcheck:
      # wget is installed in the runtime image (see Dockerfile) — no curl needed.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # deploy.resources requires Docker Compose v2 plugin (docker compose, NOT docker-compose v1).
    # Ubuntu 22.04+ and CentOS 7 with docker-ce >= 20.10 both support this via the compose plugin.
    deploy:
      resources:
        limits:
          # Default raised to 1G: BI/OLAP queries (DuckDB) can spike well past
          # 512M. Tune via APP_MEM_LIMIT / APP_CPU_LIMIT in .env.prod.
          memory: ${APP_MEM_LIMIT:-1G}
          cpus: "${APP_CPU_LIMIT:-1.0}"
        reservations:
          memory: ${APP_MEM_RESERVATION:-256M}
          cpus: "0.5"

  # ─── Background Worker (INF-001) ─────────────────────────────
  # Runs BullMQ processors + cron schedulers + outbox relay. Without it,
  # background jobs and domain events are never processed. Run EXACTLY ONE.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-backend:latest
    container_name: erp-worker
    restart: unless-stopped
    # App container owns `prisma migrate deploy`; worker just boots the process.
    command: ["node", "dist/worker.js"]
    # Long enough to let an in-flight BullMQ job finish (app.close() drains
    # queues + AMQP on SIGTERM) before the container is force-killed.
    stop_grace_period: 30s
    environment:
      <<: *app-env
      # Worker owns ETL → it is the sole READ_WRITE owner of the cube file.
      DUCKDB_READONLY: "false"
    volumes:
      # Shares the DuckDB cube volume with `app` (worker runs the OLAP reload
      # cron). Worker writes; app reads. See the single-writer note on the volume.
      - duckdbdata:/app/data
    healthcheck:
      # No HTTP listener — a simple process check is enough.
      test: ["CMD-SHELL", "pgrep -f 'dist/worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # Gate on the app being healthy so `prisma migrate deploy` (run by the app
      # container before it starts listening) has finished — the worker must
      # never process jobs against an un-migrated schema.
      app:
        condition: service_healthy
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # Worker runs the OLAP ETL (DuckDB writes) — give it headroom too.
          memory: ${WORKER_MEM_LIMIT:-768M}
          cpus: "${WORKER_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${WORKER_MEM_RESERVATION:-128M}
          cpus: "0.25"

  # ─── RabbitMQ (INF-002) ──────────────────────────────────────
  # Domain-event bus. Internal only — no host ports exposed.
  # AMQP port is configurable via RABBITMQ_PORT (default 5672); if you change it,
  # keep RABBITMQ_URL in .env.prod in sync:
  #   RABBITMQ_URL=amqp://erp:<RABBITMQ_DEFAULT_PASS>@rabbitmq:${RABBITMQ_PORT}
  rabbitmq:
    # Pinned to a specific minor (was floating `3-management`) for reproducible
    # deploys. For full immutability, pin by digest:
    #   docker buildx imagetools inspect rabbitmq:3.13-management   # → @sha256:...
    image: rabbitmq:3.13-management
    container_name: erp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-erp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required in .env.prod}
      # AMQP listen port (internal to erp-network). Management UI stays on 15672.
      RABBITMQ_NODE_PORT: ${RABBITMQ_PORT:-5672}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # AMQP (5672) and management UI (15672) NOT exposed to host.
    # Management UI if needed: docker exec or an SSH tunnel + temporary port map.

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: erp-postgres
    restart: unless-stopped
    # Give Postgres time to flush a final checkpoint on shutdown instead of
    # being SIGKILLed at 10s (which forces slow crash recovery on next boot).
    stop_grace_period: 60s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_prod}
      POSTGRES_USER: ${POSTGRES_USER:-erp_admin}
      # :? means Docker will fail loudly if POSTGRES_PASSWORD is not set — intentional
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.prod}
      # Listen port (internal to erp-network). Default 5432; declare POSTGRES_PORT
      # in .env.prod to change. DATABASE_URL above is built from the same var.
      PGPORT: ${POSTGRES_PORT:-5432}
    volumes:
      # Named volume — data survives: `docker compose down`, `docker compose restart`,
      # OS reboots, and image rebuilds. Only `docker compose down -v` would delete it.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_admin} -d ${POSTGRES_DB:-erp_prod} -p ${POSTGRES_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    # PostgreSQL port NOT exposed to host — only accessible within erp-network.
    # Access via: docker exec -it erp-postgres psql -U erp_admin -d erp_prod

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    # --appendonly yes  → AOF persistence: data survives restart/crash
    # --maxmemory       → cap memory usage
    # --maxmemory-policy volatile-lru  → only evict keys WITH TTL (expiry set).
    #   This protects session data and refresh tokens (no TTL) from eviction.
    #   allkeys-lru (previous) would evict ANY key including auth tokens.
    command: >
      redis-server
      --port ${REDIS_PORT:-6379}
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy volatile-lru
    volumes:
      # Named volume — Redis AOF data persists across restarts
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_PORT:-6379} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Redis port NOT exposed to host — only accessible within erp-network.

# ─── Docker Secrets (JWT RS256 Keys) ─────────────────────────
# Keys are mounted as files at /run/secrets/ inside the container.
# They are NEVER stored as environment variables (avoids `env` leaking them).
secrets:
  jwt_private_key:
    file: ${JWT_PRIVATE_KEY_FILE:-./keys/private.pem}
  jwt_public_key:
    file: ${JWT_PUBLIC_KEY_FILE:-./keys/public.pem}

# ─── Volumes ─────────────────────────────────────────────────
# Named volumes are managed by Docker and persist independently of containers.
# Data is stored at: /var/lib/docker/volumes/erp-backend_pgdata/_data
#
# Backup command (PostgreSQL):
#   docker exec erp-postgres pg_dump -U erp_admin erp_prod | gzip > backup_$(date +%Y%m%d_%H%M%S).sql.gz
#
# Restore command:
#   gunzip -c backup_YYYYMMDD_HHMMSS.sql.gz | docker exec -i erp-postgres psql -U erp_admin -d erp_prod
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  rabbitmqdata:
    driver: local
  # DuckDB OLAP cube (BI-001). Only written when DUCKDB_PATH=/app/data/... is set.
  # DuckDB is single-writer per file: the worker holds it READ_WRITE (ETL) and the
  # app opens it READ_ONLY (queries) — DuckDbService opens on demand + releases the
  # lock between operations, so the two processes share this one file safely (see
  # DUCKDB_READONLY per service). The cube is derived from OLTP and reloaded every
  # 15 min, so this volume avoids a full rebuild + transient 503s after a restart.
  duckdbdata:
    driver: local

# ─── Networks ────────────────────────────────────────────────
networks:
  erp-network:
    driver: bridge
