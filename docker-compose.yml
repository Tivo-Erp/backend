version: '3.8'
services:
  postgres:
    image: postgres:17-alpine
    ports: ['5432:5432']
    environment:
      POSTGRES_DB: erp_dev
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: erp_secret_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

volumes:
  pgdata:
